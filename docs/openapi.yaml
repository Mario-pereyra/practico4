      - updatedAt
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
        name:
          type: string
          minLength: 1
          maxLength: 100
        rows:
          type: integer
          minimum: 1
          maximum: 26
        columns:
          type: integer
          minimum: 1
          maximum: 50
