          type: integer
          format: int64
          minimum: 1
        roomId:
          type: integer
          format: int64
          minimum: 1
        rowLabel:
          type: string
          pattern: ^[A-Z]$
        columnNumber:
          type: integer
          minimum: 1
          maximum: 50
        code:
          type: string
          pattern: ^[A-Z][1-9][0-9]?$
