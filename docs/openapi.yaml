      - currency
      - room
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
        startsAt:
          type: string
          format: date-time
          example: '2026-06-25T22:00:00Z'
        endsAt:
          type: string
          format: date-time
          example: '2026-06-26T00:10:00Z'
        price:
          type: number
          minimum: 0.01
          maximum: 99999999.99
          multipleOf: 0.01
          example: 45.0
        currency:
          type: string
          const: BOB
        room:
          $ref: '#/components/schemas/RoomPublicSummary'
    MovieDetail:
      type: object
      additionalProperties: false
      required:
      - id
      - title
      - synopsis
      - genre
      - durationMinutes
      - rating
      - posterUrl
      - showtimes
      properties:
        id:
          type: integer
          format: int64
          minimum: 1
        title:
          type: string
          minLength: 1
          maxLength: 160
        synopsis:
          type: string
          minLength: 1
          maxLength: 2000
        genre:
          $ref: '#/components/schemas/MovieGenre'
        durationMinutes:
          type: integer
