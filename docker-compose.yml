version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cine-reservas-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: cine_reservas
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: ./backend
    container_name: cine-reservas-api
    ports:
      - '3000:3000'
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: password123
      DB_DATABASE: cine_reservas
      JWT_SECRET: super-secret-key-123
      PORT: 3000
    depends_on:
      - postgres
    command: sh -c "node -e \"const net = require('net'); const check = () => { const s = new net.Socket(); s.connect(5432, 'postgres', () => { s.destroy(); process.exit(0); }); s.on('error', () => { setTimeout(check, 1000); }); }; check();\" && npm run migration:run && npm run seed:run && npm run start:prod"
    restart: always

  frontend:
    build: ./frontend
    container_name: cine-reservas-web
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: always

  show-info:
    image: alpine
    container_name: cine-reservas-info
    depends_on:
      - frontend
    command: >
      sh -c "
      echo ' ' &&
      echo '========================================================================' &&
      echo '   🚀 ¡CINE RESERVAS HA INICIALIZADO Y ESTÁ LISTO PARA USAR! 🚀' &&
      echo '========================================================================' &&
      echo '  🌐 Frontend (Web Client): http://localhost' &&
      echo '  🔌 Backend API (NestJS):  http://localhost:3000' &&
      echo '  🗄️ Base de Datos (Port):  5433' &&
      echo '------------------------------------------------------------------------' &&
      echo '  💡 Tips útiles para desarrolladores:' &&
      echo '     * Apagar y limpiar base de datos: docker-compose down -v' &&
      echo '     * Rebuildeas y levantar cambios:  docker-compose up --build' &&
      echo '     * Ver logs en tiempo real (API):  docker logs -f cine-reservas-api' &&
      echo '     * Ver logs en tiempo real (WEB):  docker logs -f cine-reservas-web' &&
      echo '========================================================================' &&
      echo ' '"
    restart: "no"

volumes:
  postgres_data:
